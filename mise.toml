[tools]
python = "3.12"
uv = "latest"

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.lint]
description = "Run lint checks"
run = "uv run ruff check ."

[tasks.run]
description = "Run greeting script"
run = "uv run python -m barista.greet"

[tasks.sync]
description = "Install project dependencies"
run = "uv sync"
